spring:
  application:
    name: core-service

  #DB Config
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  #JPA (Hibernate) Config
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  #Liquibase Config
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  #GraphQL Config
  graphql:
    graphiql:
      enabled: false
    schema:
      printer:
        enabled: false

  #Virtual Threads enabled
  threads:
    virtual:
      enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: ${JWT_EXPIRATION_MS}
